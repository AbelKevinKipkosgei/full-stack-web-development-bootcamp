<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mondrian Project</title>
    <style>
      /*
      Write your CSS here
      Gap Colour: #000
      White: #F0F1EC
      Red: #E72F24
      Black: #232629
      Blue: #004592
      Yellow: #F9D01E

      For dimensions, see dimensions.png image.
      HINT: Remember you can't change the properties of grid lines.
      But grid lines are transparent!
      */
      body {
        height: 100dvh;
        margin: 0;
      }

      .page-container {
        display: flex;
        justify-content: center;
        height: 100dvh;
        align-items: center;
      }

      .grid-container {
        display: grid;
        background-color: black;
        grid-template-columns: 320px 419px;
        grid-template-rows: 414px 296px 20px;
        gap: 9px;
        height: 748px;
        width: 748px;
      }

      .row2-grid {
        display: grid;
        grid-template-columns: 320px 360px 50px;
        gap: 9px;
        grid-template-rows: 296px 20px;
      }

      .blue-white {
        display: grid;
        grid-template-rows: 140px 175px;
        gap: 9px;
      }

      .yellow-black {
        display: grid;
        grid-template-columns: 198px 153px;
        gap: 9px;
      }

      .red {
        background-color: #e72f24;
        height: 414px;
        width: 320px;
      }

      .white1 {
        background-color: #f0f1ec;
        height: 414px;
      }

      .white2 {
        background-color: #f0f1ec;
        height: 296px;
        width: 320px;
      }

      .white3 {
        background-color: #f0f1ec;
        height: 296px;
        width: 360px;
      }

      .blue {
        background-color: #004592;
        width: 50px;
        height: 130px;
        border-bottom: 10px solid black;
      }

      .white4 {
        background-color: #f0f1ec;
        width: 50px;
        height: 175px;
      }

      .white5 {
        background-color: #f0f1ec;
        width: 320px;
      }

      .yellow {
        background-color: #f9d01e;
        width: 198px;
      }

      .black {
        background-color: #232629;
        width: 153px;
        height: 20px;
      }
    </style>
  </head>

  <body>
    <!-- Write your HTML here -->
    <div class="page-container">
      <div class="grid-container">
        <div class="red"></div>
        <div class="white1"></div>
        <div class="row2-grid">
          <div class="white2"></div>
          <div class="white3"></div>
          <div class="blue-white">
            <div class="blue"></div>
            <div class="white4"></div>
          </div>
          <div class="white5"></div>
          <div class="yellow-black">
            <div class="yellow"></div>
            <div class="black"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
